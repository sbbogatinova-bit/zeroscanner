<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic Ultra Scanner</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --green: #2ecc71; --dark: #2c3e50; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 450px; margin: auto; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 30px; backdrop-filter: blur(10px); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .points-badge { background: var(--green); padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; }

        #video-container { 
            position: relative; width: 100%; height: 350px; border-radius: 25px; overflow: hidden; 
            border: 3px solid rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s; }
        
        /* Визуален скенер ефект */
        .scanner-frame {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; height: 160px; border: 2px solid var(--green);
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); border-radius: 15px;
        }
        .laser { position: absolute; width: 100%; height: 2px; background: #ff0000; top: 0; animation: move 2s infinite linear; box-shadow: 0 0 8px #ff0000; }
        @keyframes move { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* Контролни бутони за камерата */
        .cam-tools { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .tool-btn { background: rgba(255,255,255,0.2); border: none; padding: 10px; border-radius: 50%; cursor: pointer; color: white; font-size: 18px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .code-btn { padding: 12px 0; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #27ae60; }
        .code-btn:active { transform: translateY(3px); box-shadow: none; }

        #result-popup { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; background: white; color: var(--dark); padding: 20px; 
            border-radius: 20px; display: none; z-index: 100; text-align: left;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }
        .filter-active { filter: contrast(150%) brightness(120%) grayscale(100%); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="points-badge">🌟 <span id="pts">0</span></div>
        <div style="font-size: 0.8rem; text-align: right;">Ранг: <br><b id="rank">Новак</b></div>
    </div>

    <div id="video-container">
        <video id="video"></video>
        <div class="scanner-frame">
            <div class="laser"></div>
        </div>
    </div>

    <div class="cam-tools">
        <button class="tool-btn" onclick="toggleFlash()" title="Светкавица">🔦</button>
        <button class="tool-btn" onclick="toggleFilter()" title="Контрастен филтър">🌓</button>
        <button class="tool-btn" onclick="resetCam()" title="Рестартирай камера">🔄</button>
    </div>

    <div class="grid">
        <button class="code-btn" onclick="manual(1)">1</button>
        <button class="code-btn" onclick="manual(2)">2</button>
        <button class="code-btn" onclick="manual(3)">3</button>
        <button class="code-btn" onclick="manual(4)">4</button>
        <button class="code-btn" onclick="manual(5)">5</button>
        <button class="code-btn" onclick="manual(6)">6</button>
        <button class="code-btn" onclick="manual(7)">7</button>
        <button class="code-btn" style="background:#95a5a6; box-shadow: 0 4px 0 #7f8c8d;" onclick="manual('?')">?</button>
    </div>

    <button onclick="window.open('https://www.google.com/maps/search/recycling+center')" 
            style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--gold); font-weight:bold; cursor:pointer;">
        📍 ПУНКТОВЕ ЗА РЕЦИКЛИРАНЕ
    </button>
</div>

<div id="result-popup">
    <h3 id="res-title" style="margin-top:0;"></h3>
    <p id="res-text"></p>
    <button onclick="this.parentElement.style.display='none'" style="width:100%; padding:10px; background:var(--green); border:none; border-radius:10px; color:white;">Затвори</button>
</div>

<script>
    let streamPtr = null;
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('video');

    async function startScanner() {
        try {
            const constraints = {
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            
            streamPtr = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = streamPtr;
            video.play();

            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result) {
                    handleScan(result.text);
                }
            });
        } catch (e) { alert("Камерата е недостъпна."); }
    }

    function handleScan(data) {
        beep();
        showPopup("Продукт разпознат!", "Успешно сканирахте баркода. Сега потърсете триъгълния символ с цифра върху опаковката и я изберете от бутоните.");
        addPoints(5);
    }

    function manual(code) {
        beep();
        const data = {
            1: ["PET", "Рециклира се лесно. Бутилки за напитки."],
            2: ["HDPE", "Безопасна пластмаса. Капачки и препарати."],
            3: ["PVC", "Вредна! Избягвайте контакта с храна."],
            4: ["LDPE", "Рециклируемо. Найлонови пликове и фолио."],
            5: ["PP", "Безопасно. Кутии за храна и сладолед."],
            6: ["PS", "Стиропор. Труден за рециклиране."],
            7: ["OTHER", "Смесена пластмаса. Почти не се рециклира."],
            '?': ["Unknown", "Липсва информация. Бъдете внимателни."]
        };
        showPopup(`Пластмаса тип ${code} (${data[code][0]})`, data[code][1]);
        addPoints(10);
    }

    function toggleFlash() {
        const track = streamPtr.getVideoTracks()[0];
        const caps = track.getCapabilities();
        if (caps.torch) {
            track.applyConstraints({ advanced: [{ torch: !track.getSettings().torch }] });
        } else { alert("Светкавицата не се поддържа от този браузър."); }
    }

    function toggleFilter() {
        video.classList.toggle('filter-active');
    }

    function showPopup(t, txt) {
        document.getElementById('res-title').innerText = t;
        document.getElementById('res-text').innerText = txt;
        document.getElementById('result-popup').style.display = 'block';
    }

    function addPoints(n) {
        let p = parseInt(localStorage.getItem('eco_pts') || "0") + n;
        localStorage.setItem('eco_pts', p);
        document.getElementById('pts').innerText = p;
        if(p > 100) document.getElementById('rank').innerText = "Еко Пазител";
    }

    function beep() {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator();
        o.connect(a.destination);
        o.start(); o.stop(a.currentTime + 0.1);
    }

    function resetCam() { location.reload(); }

    window.onload = () => {
        startScanner();
        document.getElementById('pts').innerText = localStorage.getItem('eco_pts') || "0";
    };
</script>
</body>
</html>
