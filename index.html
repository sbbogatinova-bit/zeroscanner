<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic Pro - Fix</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --green: #27ae60; --dark: #121212; --yellow: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 450px; margin: auto; }
        
        .map-link { display: block; width: 100%; padding: 15px 0; background: var(--yellow); color: black; text-decoration: none; font-weight: bold; border-radius: 15px; margin-bottom: 15px; font-size: 1.1rem; }

        #video-container { 
            position: relative; width: 100%; height: 300px; border-radius: 20px; 
            overflow: hidden; border: 3px solid var(--green); background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60%; border: 2px solid #fff; border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .btn { padding: 15px 0; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        
        #alert-box { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 15px; border-radius: 15px; width: 80%; display: none; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="https://www.google.com/maps/search/recycling+center" target="_blank" class="map-link">📍 ПУНКТОВЕ ЗА РЕЦИКЛИРАНЕ</a>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div style="font-size:1.8rem;">🌟 <span id="pts">0</span></div>
        <button onclick="toggleTorch()" style="padding:10px; border-radius:10px; border:none; background:#333; color:white;">🔦 Фенер</button>
    </div>

    <div id="video-container">
        <video id="video" playsinline></video>
        <div class="scan-overlay"></div>
    </div>

    <div class="grid">
        <button class="btn" onclick="manual(1)">1</button>
        <button class="btn" onclick="manual(2)">2</button>
        <button class="btn" onclick="manual(3)">3</button>
        <button class="btn" onclick="manual(4)">4</button>
        <button class="btn" onclick="manual(5)">5</button>
        <button class="btn" onclick="manual(6)">6</button>
        <button class="btn" onclick="manual(7)">7</button>
        <button class="btn" style="background:#555" onclick="manual('?')">?</button>
    </div>
</div>

<div id="alert-box"></div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('video');
    let videoTrack = null;
    let canScan = true;

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            
            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result && canScan) {
                    processScan("Баркод разпознат!", 5);
                }
            });
        } catch (e) {
            console.error("Камера грешка:", e);
            // Проба за лаптоп, ако горното не тръгне
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => { video.srcObject = s; });
        }
        updatePts();
    }

    function processScan(msg, p) {
        canScan = false; // Спирачка
        beep();
        showAlert(msg + " +" + p + " точки");
        addPts(p);
        setTimeout(() => { canScan = true; }, 5000); // 5 секунди пауза
    }

    function manual(code) {
        processScan("Записан символ " + code, 10);
    }

    function showAlert(txt) {
        const box = document.getElementById('alert-box');
        box.innerText = txt;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 3000);
    }

    function addPts(n) {
        let p = parseInt(localStorage.getItem('eco_pts') || "0") + n;
        localStorage.setItem('eco_pts', p);
        updatePts();
    }

    function updatePts() {
        document.getElementById('pts').innerText = localStorage.getItem('eco_pts') || "0";
    }

    function toggleTorch() {
        if (videoTrack && videoTrack.getCapabilities().torch) {
            videoTrack.applyConstraints({ advanced: [{ torch: !videoTrack.getSettings().torch }] });
        }
    }

    function beep() {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator();
        o.connect(a.destination);
        o.start(); o.stop(a.currentTime + 0.1);
    }

    window.onload = init;
</script>
</body>
</html>
