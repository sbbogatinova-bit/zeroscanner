<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic - Ultimate Focus</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --green: #2ecc71; --dark: #1a202c; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 450px; margin: auto; }
        
        #video-container { 
            position: relative; width: 100%; height: 350px; border-radius: 20px; 
            overflow: hidden; border: 3px solid var(--green); background: #000;
            touch-action: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Рамка за прицелване */
        .guide-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; height: 140px; border: 2px solid #fff;
            border-radius: 10px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }
        .laser { position: absolute; width: 100%; height: 2px; background: #00ff00; top: 50%; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .btn { padding: 15px 0; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
        <div style="font-size:1.5rem;">🌟 <span id="pts">0</span></div>
        <button onclick="toggleFlash()" style="background:#4a5568; border:none; color:#fff; border-radius:10px; padding:10px 15px;">ФЕНЕР 🔦</button>
    </div>

    <div id="video-container" onclick="forceFocus()">
        <video id="video" playsinline></video>
        <div class="guide-box"><div class="laser"></div></div>
    </div>

    <p style="font-size:0.9rem; color:#cbd5e0; margin:10px 0;">👇 Докосни екрана, за да фокусираш!</p>

    <div class="controls">
        <button class="btn" onclick="tap(1)">1</button>
        <button class="btn" onclick="tap(2)">2</button>
        <button class="btn" onclick="tap(3)">3</button>
        <button class="btn" onclick="tap(4)">4</button>
        <button class="btn" onclick="tap(5)">5</button>
        <button class="btn" onclick="tap(6)">6</button>
        <button class="btn" onclick="tap(7)">7</button>
        <button class="btn" style="background:#4a5568" onclick="tap('?')">?</button>
    </div>
</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('video');
    let videoTrack = null;

    async function init() {
        try {
            const constraints = {
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];

            // Стартиране на скенера
            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result) {
                    vibrate();
                    alert("Баркодът е разчетен успешно! Погледни триъгълника за бонус.");
                    add(5);
                }
            });

            // Опит за активиране на автофокус режим
            forceFocus();

        } catch (e) { alert("Грешка с камерата: " + e); }
    }

    function forceFocus() {
        if (videoTrack && videoTrack.applyConstraints) {
            const constraints = {
                advanced: [
                    { focusMode: "continuous" },
                    { focusDistance: 0.1 } // Опит за Macro фокус
                ]
            };
            videoTrack.applyConstraints(constraints).catch(e => console.log("Focus mode not supported"));
        }
    }

    function toggleFlash() {
        if (videoTrack) {
            const settings = videoTrack.getSettings();
            videoTrack.applyConstraints({
                advanced: [{ torch: !settings.torch }]
            });
        }
    }

    function tap(c) {
        vibrate();
        add(10);
        alert("Код " + c + " записан. Получаваш 10 точки!");
    }

    function add(n) {
        let p = parseInt(localStorage.getItem('eco_pts') || "0") + n;
        localStorage.setItem('eco_pts', p);
        document.getElementById('pts').innerText = p;
    }

    function vibrate() {
        if (navigator.vibrate) navigator.vibrate(100);
    }

    window.onload = init;
</script>
</body>
</html>
