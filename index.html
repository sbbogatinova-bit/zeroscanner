<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic - Verified Pro</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --green: #2ecc71; --dark: #121212; --yellow: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        
        /* ГОРЕН ПАНЕЛ */
        .header-ui { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; }
        .pts-box { font-size: 1.8rem; font-weight: bold; color: var(--green); }
        
        /* БУТОН ПУНКТОВЕ - ВИНАГИ ВИДИМ */
        .map-btn { background: var(--yellow); color: #000; text-decoration: none; padding: 15px; border-radius: 15px; font-weight: bold; text-align: center; font-size: 1.1rem; border: none; }

        /* КАМЕРА */
        #video-container { position: relative; width: 100%; height: 300px; border-radius: 25px; overflow: hidden; border: 4px solid var(--green); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 130px; border: 2px solid #fff; border-radius: 10px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); pointer-events: none; }
        .line { position: absolute; width: 100%; height: 2px; background: var(--green); top: 50%; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }

        /* БУТОНИ 1-7 */
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .num-btn { padding: 15px 0; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .num-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* ИЗВЕСТИЕ */
        #status-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 15px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="status-popup"></div>

<div class="container">
    <a href="https://www.google.com/maps/search/recycling+center" target="_blank" class="map-btn">📍 НАМЕРИ ПУНКТ ЗА РЕЦИКЛИРАНЕ</a>

    <div class="header-ui">
        <div class="pts-box">🌟 <span id="points-display">0</span></div>
        <button onclick="toggleTorch()" style="background:#444; color:#fff; border:none; padding:10px; border-radius:10px;">ФЕНЕР 🔦</button>
    </div>

    <div id="video-container">
        <video id="video" playsinline></video>
        <div class="overlay"><div class="line"></div></div>
    </div>

    <div class="btn-grid">
        <button class="num-btn" onclick="addManual(1)">1</button>
        <button class="num-btn" onclick="addManual(2)">2</button>
        <button class="num-btn" onclick="addManual(3)">3</button>
        <button class="num-btn" onclick="addManual(4)">4</button>
        <button class="num-btn" onclick="addManual(5)">5</button>
        <button class="num-btn" onclick="addManual(6)">6</button>
        <button class="num-btn" onclick="addManual(7)">7</button>
        <button class="num-btn" style="background:#666" onclick="addManual('?')">?</button>
    </div>
</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('video');
    let videoTrack = null;
    
    // ПРОМЕНЛИВИ ЗА ЗАЩИТА
    let isProcessing = false;
    let lastCode = "";
    let lastTime = 0;

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 } } 
            });
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            
            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result && !isProcessing) {
                    handleAutoScan(result.text);
                }
            });
        } catch (e) {
            console.error("Camera error:", e);
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => { video.srcObject = s; });
        }
        refreshUI();
    }

    function handleAutoScan(code) {
        const now = Date.now();
        // Защита: Ако е същият баркод, чакаме 30 секунди преди нова порция точки
        if (code === lastCode && (now - lastTime < 30000)) return;

        isProcessing = true;
        lastCode = code;
        lastTime = now;

        triggerSuccess("Баркод разпознат! +5 точки", 5);
        
        // Отключваме скенера след 3 секунди
        setTimeout(() => { isProcessing = false; }, 3000);
    }

    function addManual(num) {
        if (isProcessing) return;
        isProcessing = true;
        triggerSuccess(`Пластмаса №${num} записана! +10 точки`, 10);
        setTimeout(() => { isProcessing = false; }, 2000);
    }

    function triggerSuccess(msg, pts) {
        // Звук и вибрация
        try {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
            if (navigator.vibrate) navigator.vibrate(100);
        } catch(e) {}

        // Точки
        let current = parseInt(localStorage.getItem('eco_total') || "0");
        localStorage.setItem('eco_total', current + pts);
        refreshUI();

        // Известие
        const pop = document.getElementById('status-popup');
        pop.innerText = msg;
        pop.style.display = 'block';
        setTimeout(() => { pop.style.display = 'none'; }, 2500);
    }

    function refreshUI() {
        document.getElementById('points-display').innerText = localStorage.getItem('eco_total') || "0";
    }

    function toggleTorch() {
        if (videoTrack && videoTrack.getCapabilities().torch) {
            videoTrack.applyConstraints({ advanced: [{ torch: !videoTrack.getSettings().torch }] });
        }
    }

    window.onload = setupCamera;
</script>
</body>
</html>
