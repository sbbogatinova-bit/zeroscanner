<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic Pro - Full Version</title>
    <style>
        :root { --green: #2c7a7b; --blue: #3182ce; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 15px; color: #2d3748; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* СТАТИСТИКА */
        .stats-bar { display: flex; justify-content: space-between; align-items: center; background: var(--green); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .score-box { font-size: 22px; font-weight: bold; }
        .rank-box { font-size: 13px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; }

        /* КАМЕРА С ПОДОБРЕН ФОКУС */
        #video-wrapper { 
            position: relative; width: 100%; max-width: 320px; margin: 10px auto; 
            border-radius: 20px; overflow: hidden; border: 4px solid var(--green); background: #000;
        }
        /* transform: scale(1.15) прави дигитално приближение, за да не доближаваш бутилката твърде много и да не се замазва */
        video { width: 100%; display: block; transform: scale(1.15); } 
        
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 130px; border: 2px solid rgba(255,255,255,0.8); 
            box-shadow: 0 0 0 500px rgba(0,0,0,0.5); border-radius: 15px; pointer-events: none;
        }

        /* БУТОНИ */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .code-btn { padding: 15px 5px; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .code-btn:active { transform: scale(0.9); }
        .loc-btn { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        /* РЕЗУЛТАТ И ДНЕВНИК */
        #result { margin-top: 15px; padding: 15px; border-radius: 15px; display: none; background: #f9fafb; border-left: 6px solid var(--green); text-align: left; }
        #history { margin-top: 25px; text-align: left; }
        .history-item { display: flex; align-items: center; background: white; padding: 10px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #edf2f7; }
        .history-item img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="score-box">🌟 <span id="total-points">0</span></div>
        <div class="rank-box" id="user-rank">Еко Начинаещ</div>
    </div>

    <div id="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div id="scanner-overlay"></div>
    </div>

    <div class="grid">
        <button class="code-btn" onclick="processSelection(1)">1</button>
        <button class="code-btn" onclick="processSelection(2)">2</button>
        <button class="code-btn" onclick="processSelection(3)">3</button>
