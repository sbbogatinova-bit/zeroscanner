<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroPlastic - Eco Game</title>
    <style>
        :root {
            --green: #2c7a7b;
            --danger: #e53e3e;
            --warning: #dd6b20;
            --safe: #38a169;
            --blue: #3182ce;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #f0f4f8;
            margin: 0;
            padding: 15px;
            color: #2d3748;
        }
        .container {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--green);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        #video-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--green);
            background: #000;
        }
        video { width: 100%; display: block; }
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 0 500px rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        .grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin: 15px 0;
        }
        button {
            padding: 12px 5px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .code-btn { background: var(--green); color: white; font-size: 16px; }
        .loc-btn { background: var(--blue); color: white; width: 100%; margin-top: 10px; }
        
        #result {
            margin-top: 15px; padding: 15px; border-radius: 15px;
            display: none; background: #f9fafb; text-align: left;
            border-left: 6px solid var(--green);
        }
        
        #history { margin-top: 25px; text-align: left; }
        .history-item {
            display: flex; align-items: center;
            background: white; padding: 10px;
            border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .history-item img {
            width: 50px; height: 50px;
            border-radius: 8px; object-fit: cover;
            margin-right: 12px;
        }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div style="font-size: 20px;">🌟 <span id="total-points">0</span> т.</div>
        <div id="user-rank" style="background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 8px;">Еко Начинаещ</div>
    </div>

    <div id="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <div id="scanner-overlay"></div>
    </div>

    <div class="grid">
        <button class="code-btn" onclick="processAction(1)">1</button>
        <button class="code-btn" onclick="processAction(2)">2</button>
        <button class="code-btn" onclick="processAction(3)">3</button>
        <button class="code-btn" onclick="processAction(4)">4</button>
        <button class="code-btn" onclick="processAction(5)">5</button>
        <button class="code-btn" onclick="processAction(6)">6</button>
        <button class="code-btn" onclick="processAction(7)">7</button>
        <button class="code-btn" style="background:#718096" onclick="processAction('?')">?</button>
    </div>

    <button class="loc-btn" onclick="findRecyclePoints()">📍 Намери пункт за рециклиране</button>

    <div id="result"></div>

    <div id="history">
        <h4>📜 Твоят Еко Дневник</h4>
        <div id="history-list"></div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    const plasticData = {
        1: { name: "PET", info: "Бутилки. Рециклирай!", color: "#38a169" },
        2: { name: "HDPE", info: "Безопасна пластмаса.", color: "#38a169" },
        3: { name: "PVC", info: "Вредна! Опасно за здравето.", color: "#e53e3e" },
        4: { name: "LDPE", info: "Торбички. Рециклирай.", color: "#38a169" },
        5: { name: "PP", info: "Кутии за храна. Безопасна.", color: "#38a169" },
        6: { name: "PS", info: "Стиропор. Опасна!", color: "#dd6b20" },
        7: { name: "OTHER", info: "Смесени пластмаси.", color: "#718096" },
        '?': { name: "Без код", info: "Бъди внимателен.", color: "#718096" }
    };

    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        } catch(e) { console.log("Audio block"); }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (err) {
            console.error("Camera access denied");
        }
    }

    function processAction(code) {
        playBeep();
        const item = plasticData[code];
        
        // Снимка за дневника
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = canvas.toDataURL('image/png');

        // Точки (съхранение)
        let points = parseInt(localStorage.getItem('eco_points') || "0") + 10;
        localStorage.setItem('eco_points', points);

        // Показване на информация
        const resDiv = document.getElementById("result");
        resDiv.style.display = "block";
        resDiv.style.borderLeftColor = item.color;
        resDiv.innerHTML = `<strong>${item.name}</strong>: ${item.info} <br><small>+10 точки добавени към профила!</small>`;

        // Запис в историята
        let history = JSON.parse(localStorage.getItem('plastic_history') || "[]");
        history.unshift({ name: item.name, img: imgData, date: new Date().toLocaleTimeString('bg-BG') });
        localStorage.setItem('plastic_history', JSON.stringify(history.slice(0, 5)));

        updateUI();
    }

    function updateUI() {
        const pts = parseInt(localStorage.getItem('eco_points') || "0");
        document.getElementById('total-points').innerText = pts;
        
        let rank = "Еко Начинаещ";
        if (pts >= 100) rank = "Пазител на природата";
        if (pts >= 300) rank = "Зелен Герой 🏆";
        document.getElementById('user-rank').innerText = rank;

        const history = JSON.parse(localStorage.getItem('plastic_history') || "[]");
        document.getElementById('history-list').innerHTML = history.map(h => `
            <div class="history-item">
                <img src="${h.img}">
                <div><strong>${h.name}</strong><br><small>${h.date}</small></div>
            </div>
        `).join('');
    }

    function findRecyclePoints() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                window.open(`https://www.google.com/maps/search/recycling+center/@${p.coords.latitude},${p.coords.longitude},14z`);
            }, () => window.open('https://www.google.com/maps/search/recycling+center/'));
        }
    }

    window.onload = () => {
        startCamera();
        updateUI();
    };
</script>
</body>
</html>
