<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic - Macro Focus</title>
    <style>
        :root { --green: #2c7a7b; --blue: #3182ce; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; background: white; padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .stats-bar { display: flex; justify-content: space-between; align-items: center; background: var(--green); color: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; }
        .score-box { font-size: 20px; font-weight: bold; }

        /* ВАЖНО: ZOOM ЕФЕКТ */
        #video-wrapper { 
            position: relative; width: 100%; height: 300px; margin: 0 auto; 
            border-radius: 20px; overflow: hidden; border: 4px solid var(--green); background: #000;
        }
        video { 
            width: 100%; height: 100%; object-fit: cover;
            /* Дигитално приближение 2 пъти */
            transform: scale(2.0); 
            transform-origin: center;
        } 
        
        /* По-малка рамка за прецизно насочване */
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border: 2px dashed #fff; 
            box-shadow: 0 0 0 500px rgba(0,0,0,0.6); border-radius: 10px; pointer-events: none;
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .code-btn { padding: 12px 0; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 18px; }
        .loc-btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: bold; margin-bottom: 10px; }
        
        #result { margin-top: 10px; padding: 10px; border-radius: 12px; display: none; background: #f9fafb; border-left: 5px solid var(--green); text-align: left; font-size: 14px; }
        .history-item { display: flex; align-items: center; background: white; padding: 8px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #eee; }
        .history-item img { width: 45px; height: 45px; border-radius: 5px; object-fit: cover; margin-right: 12px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="score-box">🌟 <span id="total-points">0</span></div>
        <div id="user-rank" style="font-size: 12px;">Еко Начинаещ</div>
    </div>

    <div id="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div id="scanner-overlay"></div>
    </div>

    <p style="font-size: 12px; color: #666; margin: 8px 0;">Дръж бутилката на 30 см от камерата!</p>

    <div class="grid">
        <button class="code-btn" onclick="tap(1)">1</button>
        <button class="code-btn" onclick="tap(2)">2</button>
        <button class="code-btn" onclick="tap(3)">3</button>
        <button class="code-btn" onclick="tap(4)">4</button>
        <button class="code-btn" onclick="tap(5)">5</button>
        <button class="code-btn" onclick="tap(6)">6</button>
        <button class="code-btn" onclick="tap(7)">7</button>
        <button class="code-btn" style="background:#718096" onclick="tap('?')">?</button>
    </div>

    <button class="loc-btn" onclick="openMap()">📍 Намери пункт</button>
    <div id="result"></div>
    <div id="history-list"></div>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    async function start() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: { ideal: "environment" },
                    // Опит за активиране на разширени настройки
                    advanced: [{ focusMode: "continuous" }, { zoom: 2.0 }]
                } 
            });
            video.srcObject = stream;
            
            // Трик за "събуждане" на фокуса при докосване на екрана
            document.body.addEventListener('click', () => {
                const track = stream.getVideoTracks()[0];
                if (track.getCapabilities().focusMode) {
                    track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
                }
            });

        } catch (e) { console.error(e); }
        ui();
    }

    function tap(code) {
        // Снимаме с лек бип
        try { new (window.AudioContext || window.webkitAudioContext)().createOscillator().start(); } catch(e){}
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img = canvas.toDataURL('image/png');

        let p = parseInt(localStorage.getItem('eco_pts') || "0") + 10;
        localStorage.setItem('eco_pts', p);

        let logs = JSON.parse(localStorage.getItem('eco_logs') || "[]");
        logs.unshift({ code, img, time: new Date().toLocaleTimeString() });
        localStorage.setItem('eco_logs', JSON.stringify(logs.slice(0, 5)));

        document.getElementById('result').style.display = "block";
        document.getElementById('result').innerText = `Код ${code} записан! +10 точки.`;
        ui();
    }

    function ui() {
        const p = localStorage.getItem('eco_pts') || "0";
        document.getElementById('total-points').innerText = p;
        const logs = JSON.parse(localStorage.getItem('eco_logs') || "[]");
        document.getElementById('history-list').innerHTML = logs.map(l => `
            <div class="history-item">
                <img src="${l.img}">
                <div><strong>№${l.code}</strong><br><small>${l.time}</small></div>
            </div>
        `).join('');
    }

    function openMap() {
        window.open('https://www.google.com/maps/search/recycling+center', '_blank');
    }

    window.onload = start;
</script>
</body>
</html>
