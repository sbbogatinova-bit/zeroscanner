<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic Pro - Full Version</title>
    <style>
        :root { --green: #2c7a7b; --blue: #3182ce; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 15px; color: #2d3748; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* СТАТИСТИКА */
        .stats-bar { display: flex; justify-content: space-between; align-items: center; background: var(--green); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .score-box { font-size: 22px; font-weight: bold; }
        .rank-box { font-size: 13px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; }

        /* КАМЕРА С ПОДОБРЕН ФОКУС */
        #video-wrapper { 
            position: relative; width: 100%; max-width: 320px; margin: 10px auto; 
            border-radius: 20px; overflow: hidden; border: 4px solid var(--green); background: #000;
        }
        /* transform: scale(1.15) прави дигитално приближение, за да не доближаваш бутилката твърде много и да не се замазва */
        video { width: 100%; display: block; transform: scale(1.15); } 
        
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 130px; border: 2px solid rgba(255,255,255,0.8); 
            box-shadow: 0 0 0 500px rgba(0,0,0,0.5); border-radius: 15px; pointer-events: none;
        }

        /* БУТОНИ */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .code-btn { padding: 15px 5px; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .code-btn:active { transform: scale(0.9); }
        .loc-btn { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        /* РЕЗУЛТАТ И ДНЕВНИК */
        #result { margin-top: 15px; padding: 15px; border-radius: 15px; display: none; background: #f9fafb; border-left: 6px solid var(--green); text-align: left; }
        #history { margin-top: 25px; text-align: left; }
        .history-item { display: flex; align-items: center; background: white; padding: 10px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #edf2f7; }
        .history-item img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="score-box">🌟 <span id="total-points">0</span></div>
        <div class="rank-box" id="user-rank">Еко Начинаещ</div>
    </div>

    <div id="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div id="scanner-overlay"></div>
    </div>

    <div class="grid">
        <button class="code-btn" onclick="processSelection(1)">1</button>
        <button class="code-btn" onclick="processSelection(2)">2</button>
        <button class="code-btn" onclick="processSelection(3)">3</button>
        <button class="code-btn" onclick="processSelection(4)">4</button>
        <button class="code-btn" onclick="processSelection(5)">5</button>
        <button class="code-btn" onclick="processSelection(6)">6</button>
        <button class="code-btn" onclick="processSelection(7)">7</button>
        <button class="code-btn" style="background:#718096" onclick="processSelection('?')">?</button>
    </div>

    <button class="loc-btn" onclick="findRecyclePoints()">📍 Намери пункт за рециклиране</button>

    <div id="result"></div>

    <div id="history">
        <h4 style="margin-bottom: 10px; color: #4a5568;">📜 Твоят Еко Дневник</h4>
        <div id="history-list"></div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const pointsDisplay = document.getElementById('total-points');
    const rankDisplay = document.getElementById('user-rank');

    const plasticData = {
        1: { name: "PET", info: "Бутилки за вода. Рециклирай!", color: "#38a169" },
        2: { name: "HDPE", info: "Препарати/Козметика. Безопасна.", color: "#38a169" },
        3: { name: "PVC", info: "ОПАСНА! Избягвай за храна.", color: "#e53e3e" },
        4: { name: "LDPE", info: "Торбички и фолио. Рециклирай.", color: "#38a169" },
        5: { name: "PP", info: "Кутии за храна. Безопасна.", color: "#38a169" },
        6: { name: "PS", info: "Стиропор. Вредна при загряване.", color: "#dd6b20" },
        7: { name: "OTHER", info: "Смесени пластмаси. Трудни за рециклиране.", color: "#718096" },
        '?': { name: "Без код", info: "Бъди внимателен с този обект.", color: "#718096" }
    };

    // ЗВУКОВ СИГНАЛ
    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.05;
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } catch(e) {}
    }

    // ИНИЦИАЛИЗАЦИЯ
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { ideal: "environment" } } 
            });
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
        } catch (err) { alert("Моля, разрешете камерата."); }
        renderUI();
    }

    // ДЕЙСТВИЕ ПРИ СКАН
    function processSelection(code) {
        playBeep();
        const item = plasticData[code];
        
        // СНИМКА
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imgData = canvas.toDataURL('image/png');

        // ТОЧКИ
        let pts = parseInt(localStorage.getItem('eco_pts') || "0") + 10;
        localStorage.setItem('eco_pts', pts);

        // ИНФО
        const resDiv = document.getElementById('result');
        resDiv.style.display = "block";
        resDiv.style.borderLeftColor = item.color;
        resDiv.innerHTML = `<strong>Код ${code} (${item.name}):</strong><br>${item.info}<br><span style="color:green; font-size:12px;">+10 точки!</span>`;

        // ЛОГ
        let logs = JSON.parse(localStorage.getItem('eco_logs') || "[]");
        logs.unshift({ name: item.name, img: imgData, date: new Date().toLocaleTimeString('bg-BG') });
        localStorage.setItem('eco_logs', JSON.stringify(logs.slice(0, 5)));

        renderUI();
    }

    function renderUI() {
        const pts = parseInt(localStorage.getItem('eco_pts') || "0");
        pointsDisplay.innerText = pts;
        
        let rank = "Еко Начинаещ";
        if (pts >= 100) rank = "Зелен Пазител";
        if (pts >= 300) rank = "Пластмасов Борец";
        if (pts >= 1000) rank = "Еко Герой 🏆";
        rankDisplay.innerText = rank;

        const logs = JSON.parse(localStorage.getItem('eco_logs') || "[]");
        document.getElementById('history-list').innerHTML = logs.map(l => `
            <div class="history-item">
                <img src="${l.img}">
                <div><strong>${l.name}</strong><br><small>${l.date}</small></div>
            </div>
        `).join('');
    }

    function findRecyclePoints() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                window.open(`https://www.google.com/maps/search/recycling+center/@${p.coords.latitude},${p.coords.longitude},14z`);
            }, () => {
                window.open('https://www.google.com/maps/search/recycling+center');
            });
        }
    }

    window.onload = initCamera;
</script>

</body>
</html>
