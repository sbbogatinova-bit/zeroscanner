<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic Pro - Scanner & Buttons</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --green: #2c7a7b; --blue: #3182ce; }
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 10px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stats-bar { display: flex; justify-content: space-between; background: var(--green); color: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; }
        
        #video-wrapper { 
            position: relative; width: 100%; height: 280px; margin: auto; 
            border-radius: 20px; overflow: hidden; border: 4px solid var(--green); background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scale(1.5); } 
        
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; height: 120px; border: 2px solid #fff; 
            box-shadow: 0 0 0 500px rgba(0,0,0,0.5); border-radius: 10px;
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: red;
            top: 50%; animation: scan 2s infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .code-btn { padding: 12px 0; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 18px; }
        .loc-btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: bold; }
        
        #result { margin-top: 10px; padding: 15px; border-radius: 12px; display: none; background: #e6fffa; border-left: 5px solid var(--green); text-align: left; }
        #history-list { margin-top: 15px; text-align: left; max-height: 200px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; background: #fff; padding: 8px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #eee; }
        .history-item img { width: 40px; height: 40px; border-radius: 5px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div style="font-size: 20px;">🌟 <span id="total-points">0</span></div>
        <div id="user-rank">Еко Начинаещ</div>
    </div>

    <div id="video-wrapper">
        <video id="video"></video>
        <div id="scanner-overlay"><div class="scan-line"></div></div>
    </div>

    <p style="font-size: 11px; color: #666; margin: 5px;">Насочи към БАРКОД или натисни цифра:</p>

    <div class="grid">
        <button class="code-btn" onclick="manual(1)">1</button>
        <button class="code-btn" onclick="manual(2)">2</button>
        <button class="code-btn" onclick="manual(3)">3</button>
        <button class="code-btn" onclick="manual(4)">4</button>
        <button class="code-btn" onclick="manual(5)">5</button>
        <button class="code-btn" onclick="manual(6)">6</button>
        <button class="code-btn" onclick="manual(7)">7</button>
        <button class="code-btn" style="background:#718096" onclick="manual('?')">?</button>
    </div>

    <button class="loc-btn" onclick="openMap()">📍 Намери пункт</button>
    <div id="result"></div>
    <div id="history-list"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('video');
    const resultDiv = document.getElementById('result');

    const plasticInfo = {
        1: "PET (Полиетилен терефталат) - Най-често бутилки. Рециклира се!",
        2: "HDPE (Полиетилен с висока плътност) - Капачки, препарати. Безопасен.",
        3: "PVC (Поливинилхлорид) - Твърда пластмаса. Вредна за храна!",
        4: "LDPE (Полиетилен с ниска плътност) - Меки торбички. Рециклира се.",
        5: "PP (Полипропилен) - Кутии за храна, кофички. Безопасен.",
        6: "PS (Полистирол) - Чаши за кафе, стиропор. Избягвай!",
        7: "OTHER - Смесени пластмаси. Трудни за рециклиране.",
        '?': "Неидентифициран символ. Провери внимателно."
    };

    // Стартиране на скенера
    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
        if (result) {
            beep();
            showResult("Баркод открит!", "Продуктът е сканиран. Провери символа на опаковката за точност.");
            addPoints(5); // По-малко точки за автоматичен баркод
            saveHistory("Баркод");
        }
    });

    function manual(code) {
        beep();
        showResult(`Код ${code}`, plasticInfo[code]);
        addPoints(10);
        saveHistory(code);
    }

    function showResult(title, text) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = `<strong>${title}</strong><br>${text}`;
    }

    function addPoints(pts) {
        let current = parseInt(localStorage.getItem('eco_pts') || "0");
        localStorage.setItem('eco_pts', current + pts);
        updateUI();
    }

    function saveHistory(type) {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img = canvas.toDataURL('image/png');

        let logs = JSON.parse(localStorage.getItem('eco_logs') || "[]");
        logs.unshift({ type, img, time: new Date().toLocaleTimeString() });
        localStorage.setItem('eco_logs', JSON.stringify(logs.slice(0, 5)));
        updateUI();
    }

    function updateUI() {
        const pts = localStorage.getItem('eco_pts') || "0";
        document.getElementById('total-points').innerText = pts;
        const logs = JSON.parse(localStorage.getItem('eco_logs') || "[]");
        document.getElementById('history-list').innerHTML = logs.map(l => `
            <div class="history-item">
                <img src="${l.img}">
                <div><strong>${l.type === 'Баркод' ? 'Скенер' : 'Код ' + l.type}</strong><br><small>${l.time}</small></div>
            </div>
        `).join('');
    }

    function beep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

    function openMap() { window.open('https://www.google.com/maps/search/recycling+center'); }

    updateUI();
</script>
</body>
</html>
