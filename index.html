<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic - Eco Game Full</title>
    <style>
        :root {
            --green: #2c7a7b;
            --blue: #3182ce;
            --light-bg: #f0f4f8;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background: var(--light-bg);
            margin: 0;
            padding: 15px;
            color: #2d3748;
        }
        .container {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        /* Статистика и Ранг */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--green);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .score-box { font-size: 22px; font-weight: bold; }
        .rank-box { font-size: 13px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; }

        /* Видео контейнер */
        #video-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--green);
            background: #000;
        }
        video { width: 100%; display: block; }
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 0 0 500px rgba(0,0,0,0.5);
            border-radius: 15px;
            pointer-events: none;
        }

        /* Бутони */
        .grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin: 15px 0;
        }
        .code-btn {
            padding: 15px 5px; border: none; border-radius: 12px;
            background: var(--green); color: white;
            font-weight: bold; cursor: pointer; font-size: 18px;
            transition: transform 0.1s;
        }
        .code-btn:active { transform: scale(0.9); }
        
        .loc-btn {
            width: 100%; padding: 15px; background: var(--blue);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; margin-top: 5px;
            cursor: pointer;
        }

        /* Инфо и История */
        #result {
            margin-top: 15px; padding: 15px; border-radius: 15px;
            display: none; background: #f9fafb; text-align: left;
            border-left: 6px solid var(--green);
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #history { margin-top: 25px; text-align: left; }
        .history-item {
            display: flex; align-items: center; background: white;
            padding: 10px; border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
        }
        .history-item img {
            width: 55px; height: 55px; border-radius: 8px;
            object-fit: cover; margin-right: 15px;
        }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="score-box">🌟 <span id="total-points">0</span></div>
        <div class="rank-box" id="user-rank">Еко Начинаещ</div>
    </div>

    <div id="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div id="scanner-overlay"></div>
    </div>

    <div class="grid">
        <button class="code-btn" onclick="processSelection(1)">1</button>
        <button class="code-btn" onclick="processSelection(2)">2</button>
        <button class="code-btn" onclick="processSelection(3)">3</button>
        <button class="code-btn" onclick="processSelection(4)">4</button>
        <button class="code-btn" onclick="processSelection(5)">5</button>
        <button class="code-btn" onclick="processSelection(6)">6</button>
        <button class="code-btn" onclick="processSelection(7)">7</button>
        <button class="code-btn" style="background:#718096" onclick="processSelection('?')">?</button>
    </div>

    <button class="loc-btn" onclick="findRecyclePoints()">📍 Намери пункт за рециклиране</button>

    <div id="result"></div>

    <div id="history">
        <h4 style="margin-bottom: 10px; color: #4a5568;">📜 Твоят Еко Дневник</h4>
        <div id="history-list"></div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const pointsDisplay = document.getElementById('total-points');
    const rankDisplay = document.getElementById('user-rank');

    const plasticData = {
        1: { name: "PET", info: "Бутилки за вода. Рециклирай!", color: "#38a169" },
        2: { name: "HDPE", info: "Опаковки за мляко/препарати. Безопасна.", color: "#38a169" },
        3: { name: "PVC", info: "ОПАСНА! Не използвай за храна.", color: "#e53e3e" },
        4: { name: "LDPE", info: "Торбички и фолио. Рециклирай.", color: "#38a169" },
        5: { name: "PP", info: "Кутии за храна, капачки. Безопасна.", color: "#38a169" },
        6: { name: "PS", info: "Стиропор/Чаши. Вредна при загряване.", color: "#dd6b20" },
        7: { name: "OTHER", info: "Смесени пластмаси. Трудни за рециклиране.", color: "#718096" },
        '?': { name: "Без символ", info: "Бъди внимателен с произхода.", color: "#718096" }
    };

    // Звуков сигнал (Бип)
    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.1;
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } catch(e) { console.log("Audio feedback error"); }
    }

    // Старт на камера
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { ideal: "environment" } } 
            });
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
        } catch (err) {
            console.error("Camera error:", err);
        }
        renderStats();
        renderHistory();
    }

    // Основна функция при натискане на бутон
    function processSelection(code) {
        playBeep();
        const item = plasticData[code];
        
        // 1. Снимка за дневника
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imgData = canvas.toDataURL('image/png');

        // 2. Обновяване на точки (+10)
        let pts = parseInt(localStorage.getItem('eco_pts') || "0") + 10;
        localStorage.setItem('eco_pts', pts);

        // 3. Показване на инфо
        const resDiv = document.getElementById('result');
        resDiv.style.display = "block";
        resDiv.style.borderLeftColor = item.color;
        resDiv.innerHTML = `<strong>Код ${code} (${item.name}):</strong><br>${item.info}<br><small style="color:green">+10 точки добавени!</small>`;

        // 4. Запис в дневника
        let logs = JSON.parse(localStorage.getItem('eco_logs') || "[]");
        logs.unshift({ name: item.name, img: imgData, date: new Date().toLocaleTimeString('bg-BG') });
        localStorage.setItem('eco_logs', JSON.stringify(logs.slice(0, 5))); // Пази последните 5

        renderStats();
        renderHistory();
    }

    function renderStats() {
        const pts = parseInt(localStorage.getItem('eco_pts') || "0");
        pointsDisplay.innerText = pts;
        
        let rank = "Еко Начинаещ";
        if (pts >= 100) rank = "Зелен Пазител";
        if (pts >= 300) rank = "Пластмасов Борец";
        if (pts >= 1000) rank = "Еко Герой 🏆";
        rankDisplay.innerText = rank;
    }

    function renderHistory() {
        const logs = JSON.parse(localStorage.getItem('eco_logs') || "[]");
        document.getElementById('history-list').innerHTML = logs.map(l => `
            <div class="history-item">
                <img src="${l.img}">
                <div><strong>${l.name}</strong><br><small style="color:#718096">${l.date}</small></div>
            </div>
        `).join('');
    }

    function findRecyclePoints() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const url = `https://www.google.com/maps/search/recycling+center/@${p.coords.latitude},${p.coords.longitude},14z`;
                window.open(url, '_blank');
            }, () => {
                window.open('https://www.google.com/maps/search/контейнери+за+рециклиране', '_blank');
            });
        }
    }

    window.onload = initCamera;
</script>

</body>
</html>
