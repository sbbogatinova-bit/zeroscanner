<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic Scanner</title>
    <style>
        :root { --green: #2c7a7b; }
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #video-container { position: relative; width: 100%; max-width: 320px; margin: auto; border-radius: 15px; overflow: hidden; background: #000; border: 4px solid var(--green); }
        video { width: 100%; display: block; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border: 2px solid #fff; box-shadow: 0 0 0 500px rgba(0,0,0,0.5); border-radius: 10px; pointer-events: none; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 15px 5px; border: none; border-radius: 10px; background: var(--green); color: white; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; background: #f9fafb; border-left: 5px solid var(--green); text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>♻️ ZeroPlastic</h2>
    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="overlay"></div>
    </div>

    <div class="grid">
        <button onclick="check(1)">1</button>
        <button onclick="check(2)">2</button>
        <button onclick="check(3)">3</button>
        <button onclick="check(4)">4</button>
        <button onclick="check(5)">5</button>
        <button onclick="check(6)">6</button>
        <button onclick="check(7)">7</button>
        <button style="background:#718096" onclick="check('?')">?</button>
    </div>

    <div id="result"></div>
</div>

<script>
    const video = document.getElementById('video');

    // ФУНКЦИЯ ЗА СТАРТИРАНЕ НА КАМЕРАТА (ОПТИМИЗИРАНА ЗА ТЕЛЕФОН)
    async function initCamera() {
        const constraints = {
            video: { facingMode: { ideal: "environment" } } // Изисква задната камера
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            // Важни атрибути за iOS/Safari:
            video.setAttribute("playsinline", true);
            video.play();
        } catch (err) {
            alert("Грешка при достъп до камерата. Моля, проверете настройките на браузъра.");
        }
    }

    const data = {
        1: "PET (Бутилки за вода) - Рециклирай!",
        2: "HDPE (Препарати) - Безопасна.",
        3: "PVC (Вредна!) - Не използвай за храна.",
        4: "LDPE (Торбички) - Рециклирай.",
        5: "PP (Кутии за храна) - Безопасна.",
        6: "PS (Стиропор) - Избягвай.",
        7: "OTHER (Смесена) - Рядко се рециклира.",
        '?': "Липсва код - Бъди внимателен."
    };

    function check(code) {
        const res = document.getElementById('result');
        res.style.display = "block";
        res.innerHTML = `<strong>Код ${code}:</strong> ${data[code]}`;
    }

    window.onload = initCamera;
</script>

</body>
</html>
