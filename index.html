<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic - Pro Scanner</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --green: #2ecc71; --dark: #111; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; text-align: center; overflow: hidden; }
        .container { max-width: 450px; margin: auto; }
        
        #video-container { 
            position: relative; width: 100%; height: 380px; border-radius: 25px; 
            overflow: hidden; border: 4px solid var(--green); background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .guide-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 160px; border: 3px solid #fff;
            border-radius: 15px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
        }
        .laser { position: absolute; width: 100%; height: 2px; background: #00ff00; top: 50%; animation: scan 2s infinite; box-shadow: 0 0 10px #00ff00; }
        @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .btn { padding: 18px 0; border: none; border-radius: 15px; background: var(--green); color: white; font-weight: bold; font-size: 1.3rem; box-shadow: 0 4px 0 #27ae60; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        
        #msg-box { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: #fff; color: #000; padding: 15px; border-radius: 15px; 
            width: 80%; display: none; z-index: 100; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; padding:10px; align-items:center;">
        <div style="font-size:1.8rem;">🌟 <span id="pts">0</span></div>
        <button onclick="toggleFlash()" style="background:#444; color:white; border:none; padding:10px 15px; border-radius:10px;">Фенер 🔦</button>
    </div>

    <div id="video-container" onclick="requestLockFocus()">
        <video id="video" playsinline></video>
        <div class="guide-box"><div class="laser"></div></div>
    </div>

    <p style="font-size:0.9rem; color:#888; margin:15px 0;">Ако е размазано, отдалечи на 25-30 см.</p>

    <div class="controls">
        <button class="btn" onclick="tap(1)">1</button>
        <button class="btn" onclick="tap(2)">2</button>
        <button class="btn" onclick="tap(3)">3</button>
        <button class="btn" onclick="tap(4)">4</button>
        <button class="btn" onclick="tap(5)">5</button>
        <button class="btn" onclick="tap(6)">6</button>
        <button class="btn" onclick="tap(7)">7</button>
        <button class="btn" style="background:#555; box-shadow:0 4px 0 #333;" onclick="tap('?')">?</button>
    </div>
</div>

<div id="msg-box" onclick="this.style.display='none'"></div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('video');
    let videoTrack = null;
    let lastScan = 0;

    async function init() {
        const constraints = {
            video: { 
                facingMode: { exact: "environment" }, // Настояваме за задна камера
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            
            // Стартиране на ZXing скенера
            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result) {
                    const now = Date.now();
                    if (now - lastScan > 3000) { // Сканира само веднъж на 3 секунди
                        lastScan = now;
                        onScanSuccess(result.text);
                    }
                }
            });
            
            setTimeout(requestLockFocus, 1000); // Опит за автоматичен фокус

        } catch (e) {
            // Ако няма камера с "exact" environment (напр. лаптоп), пробваме нормално
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
                video.srcObject = s;
                videoTrack = s.getVideoTracks()[0];
            });
        }
        updateScore();
    }

    function requestLockFocus() {
        if (videoTrack && videoTrack.applyConstraints) {
            // Настройки за максимален фокус
            videoTrack.applyConstraints({
                advanced: [
                    { focusMode: "continuous" },
                    { exposureMode: "continuous" },
                    { whiteBalanceMode: "continuous" }
                ]
            }).catch(() => console.log("Focus constraints rejected"));
        }
    }

    function onScanSuccess(data) {
        if (navigator.vibrate) navigator.vibrate(200);
        showMsg("БАРКОД РАЗПОЗНАТ! ✨<br>Сега избери цифрата на пластмасата за бонус точки.");
        addPts(5);
    }

    function tap(code) {
        if (navigator.vibrate) navigator.vibrate(50);
        const info = {
            1: "PET (1): Бутилки за вода/сок.",
            2: "HDPE (2): Козметика и мляко.",
            3: "PVC (3): Вредно! Не рециклирай.",
            4: "LDPE (4): Найлонови торбички.",
            5: "PP (5): Кутии за храна.",
            6: "PS (6): Стиропор.",
            7: "OTHER (7): Смесена.",
            '?': "Непозната пластмаса."
        };
        showMsg(`ЗАПИСАНО: ${info[code]} <br>+10 точки!`);
        addPts(10);
    }

    function showMsg(html) {
        const box = document.getElementById('msg-box');
        box.innerHTML = html;
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 4000);
    }

    function addPts(n) {
        let p = parseInt(localStorage.getItem('eco_pts') || "0") + n;
        localStorage.setItem('eco_pts', p);
        updateScore();
    }

    function updateScore() {
        document.getElementById('pts').innerText = localStorage.getItem('eco_pts') || "0";
    }

    function toggleFlash() {
        if (videoTrack) {
            const caps = videoTrack.getCapabilities();
            if (caps.torch) {
                videoTrack.applyConstraints({ advanced: [{ torch: !videoTrack.getSettings().torch }] });
            }
        }
    }

    window.onload = init;
</script>
</body>
</html>
