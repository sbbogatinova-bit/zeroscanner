<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic - Ultimate Fix</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --green: #2ecc71; --dark: #1a202c; --gold: #f1c40f; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* ГОРЕН ПАНЕЛ */
        .header { background: #2d3748; padding: 15px; z-index: 20; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .map-btn { display: block; width: 100%; background: var(--gold); color: black; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-bottom: 10px; }
        .score-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.4rem; font-weight: bold; }

        /* КАМЕРА КОНТЕЙНЕР */
        #video-container { position: relative; flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .target-box { 
            position: absolute; width: 280px; height: 140px; border: 3px solid var(--green); border-radius: 15px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); pointer-events: none; z-index: 5;
        }

        /* БУТОНИ ДОЛУ */
        .footer { padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #2d3748; }
        .num-btn { background: var(--green); border: none; color: white; padding: 15px 0; border-radius: 10px; font-weight: bold; font-size: 1.2rem; }
        
        #start-prompt { position: absolute; z-index: 30; background: var(--green); color: white; padding: 20px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="header">
    <a href="https://www.google.com/maps/search/recycling+center" target="_blank" class="map-btn">📍 НАМЕРИ ПУНКТ ЗА РЕЦИКЛИРАНЕ</a>
    <div class="score-row">
        <div>🌟 <span id="points">0</span></div>
        <button onclick="location.reload()" style="background:#4a5568; color:white; border:none; padding:8px 15px; border-radius:8px;">🔄 Рестарт</button>
    </div>
</div>

<div id="video-container">
    <button id="start-prompt" onclick="startCamera()">ПУСНИ КАМЕРАТА 📷</button>
    <video id="video" playsinline muted autoplay></video>
    <div class="target-box"></div>
</div>

<div class="footer">
    <button class="num-btn" onclick="addPts(10, 'Тип 1')">1</button>
    <button class="num-btn" onclick="addPts(10, 'Тип 2')">2</button>
    <button class="num-btn" onclick="addPts(10, 'Тип 3')">3</button>
    <button class="num-btn" onclick="addPts(10, 'Тип 4')">4</button>
    <button class="num-btn" onclick="addPts(10, 'Тип 5')">5</button>
    <button class="num-btn" onclick="addPts(10, 'Тип 6')">6</button>
    <button class="num-btn" onclick="addPts(10, 'Тип 7')">7</button>
    <button class="num-btn" style="background:#4a5568" onclick="addPts(5, 'Неясно')">?</button>
</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let isLocked = false;

    async function startCamera() {
        document.getElementById('start-prompt').style.display = 'none';
        try {
            // Пробваме със стандартни настройки
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            const videoElem = document.getElementById('video');
            videoElem.srcObject = stream;
            
            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result && !isLocked) {
                    isLocked = true;
                    alert("Сканирано: " + result.text);
                    addPts(5, "Баркод");
                    setTimeout(() => { isLocked = false; }, 5000); 
                }
            });
        } catch (err) {
            console.error(err);
            document.getElementById('start-prompt').style.display = 'block';
            alert("Моля, разрешете камерата от настройките на браузъра.");
        }
    }

    function addPts(p, label) {
        if (isLocked && label !== 'Баркод') {
            alert("Изчакай 5 секунди...");
            return;
        }
        
        let total = parseInt(localStorage.getItem('eco_score') || "0") + p;
        localStorage.setItem('eco_score', total);
        document.getElementById('points').innerText = total;
        
        if (label !== 'Баркод') {
            isLocked = true;
            setTimeout(() => { isLocked = false; }, 2000);
            alert(label + " записан!");
        }
    }

    window.onload = () => {
        document.getElementById('points').innerText = localStorage.getItem('eco_score') || "0";
        startCamera();
    };
</script>
</body>
</html>
