<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroPlastic - Crystal Focus</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --green: #2ecc71; --dark: #1a202c; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; text-align: center; overflow: hidden; }
        .container { max-width: 450px; margin: auto; }
        
        /* Видео без зуум за максимална острота */
        #video-container { 
            position: relative; width: 100%; height: 380px; border-radius: 20px; 
            overflow: hidden; border: 3px solid var(--green); background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Тънка рамка за насочване */
        .guide-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 160px; border: 2px solid rgba(255,255,255,0.5);
            border-radius: 10px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4);
        }
        .line { position: absolute; width: 100%; height: 2px; background: #00ff00; top: 50%; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .btn { padding: 12px 0; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        
        #msg { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 15px; border-radius: 15px; display: none; width: 85%; z-index: 10; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; padding:10px;">
        <div style="font-size:1.5rem;">🌟 <span id="pts">0</span></div>
        <button onclick="toggleFlash()" style="background:none; border:1px solid #fff; color:#fff; border-radius:50%; width:40px; height:40px;">🔦</button>
    </div>

    <div id="video-container" onclick="requestManualFocus()">
        <video id="video"></video>
        <div class="guide-box"><div class="line"></div></div>
    </div>

    <p style="font-size:0.8rem; color:#a0aec0; margin:10px 0;">Докосни камерата, ако е размазано!</p>

    <div class="controls">
        <button class="btn" onclick="tap(1)">1</button>
        <button class="btn" onclick="tap(2)">2</button>
        <button class="btn" onclick="tap(3)">3</button>
        <button class="btn" onclick="tap(4)">4</button>
        <button class="btn" onclick="tap(5)">5</button>
        <button class="btn" onclick="tap(6)">6</button>
        <button class="btn" onclick="tap(7)">7</button>
        <button class="btn" style="background:#4a5568" onclick="tap('?')">?</button>
    </div>
</div>

<div id="msg">
    <b id="msg-t"></b><br><span id="msg-b"></span><br>
    <button onclick="this.parentElement.style.display='none'" style="margin-top:10px; width:100%; padding:8px; border-radius:5px; border:none; background:#eee;">OK</button>
</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('video');
    let videoTrack = null;

    async function init() {
        try {
            const constraints = {
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    focusMode: "continuous"
                }
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];

            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result) {
                    beep();
                    pop("Баркод сканиран!", "Браво! Продуктът е в базата. Сега избери номера от триъгълника за 10 бонус точки.");
                    add(5);
                }
            });
        } catch (e) { console.error(e); }
    }

    function requestManualFocus() {
        if (videoTrack && videoTrack.applyConstraints) {
            videoTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] })
                .catch(e => console.log("Focus not supported"));
        }
    }

    function tap(c) {
        beep();
        const info = {
            1: "PET: Рециклирай!", 2: "HDPE: Безопасно.", 3: "PVC: Вредно!",
            4: "LDPE: Торбички.", 5: "PP: Безопасно.", 6: "PS: Стиропор.",
            7: "OTHER: Смесена.", '?': "Непознато."
        };
        pop("Код " + c, info[c]);
        add(10);
    }

    function pop(t, b) {
        document.getElementById('msg-t').innerText = t;
        document.getElementById('msg-b').innerText = b;
        document.getElementById('msg').style.display = 'block';
    }

    function add(n) {
        let p = parseInt(localStorage.getItem('eco_pts') || "0") + n;
        localStorage.setItem('eco_pts', p);
        document.getElementById('pts').innerText = p;
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        o.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 0.1);
    }

    function toggleFlash() {
        if (videoTrack) {
            const caps = videoTrack.getCapabilities();
            if (caps.torch) {
                videoTrack.applyConstraints({ advanced: [{ torch: !videoTrack.getSettings().torch }] });
            }
        }
    }

    window.onload = init;
</script>
</body>
</html>
